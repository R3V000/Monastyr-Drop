<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Monastyr - patch notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <aside class="patch-sidebar" aria-label="Lista patchy">
      <div class="patch-sidebar-inner">
        <a class="back-link" href="../">Panel</a>
        <p class="patch-kicker">Monastyr</p>
        <h1>Patch notes</h1>
        <nav id="patch-list" class="patch-list" aria-label="Dostępne patche"></nav>
      </div>
    </aside>

    <main class="patch-viewer" aria-live="polite">
      <header class="patch-viewer-head">
        <div>
          <p id="patch-status" class="patch-kicker">Aktualny patch</p>
          <h2 id="patch-title">Ładowanie</h2>
        </div>
        <a
          id="patch-direct-link"
          class="direct-link"
          href="./"
          target="_blank"
          rel="noreferrer"
          aria-label="Otwórz pełny patch w nowej karcie"
        >
          Pełny patch w nowej karcie
        </a>
      </header>
      <iframe id="patch-frame" title="Treść patch notes"></iframe>
    </main>

    <aside id="outdated-patch-note" class="outdated-patch-note" aria-live="polite" hidden>
      <p>
        Przeglądasz archiwalną wersję patcha: <strong id="outdated-patch-label"></strong>.
        Aktualna wersja to <strong id="current-patch-label"></strong>.
      </p>
      <button id="current-patch-button" type="button">Przejdź do aktualnej wersji</button>
    </aside>

    <script src="patches.config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
